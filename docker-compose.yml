services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gungnir
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gungnir}
      POSTGRES_DB: gungnir
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - GUNGNIR_SECRET_KEY=${GUNGNIR_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://gungnir:gungnir@db:5432/gungnir}
    env_file:
      - .env
    # Lets the container reach services running on the Docker host (Linux).
    # Used by the Ollama provider when Ollama is installed directly on the
    # VPS — users should set base_url to http://host.docker.internal:11434/v1
    # in the provider settings UI.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./backend/plugins:/app/backend/plugins
      - ./backend/data:/app/backend/data

volumes:
  pgdata:
