# ============================================================================
# Gungnir — Nginx site config
#
# Installation:
#   cp nginx-gungnir.conf /etc/nginx/sites-available/gungnir
#   ln -s /etc/nginx/sites-available/gungnir /etc/nginx/sites-enabled/gungnir
#   nginx -t && systemctl reload nginx
#
# Puis SSL:
#   certbot --nginx -d gungnir.scarletwolf.cloud
# ============================================================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=gungnir_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=gungnir_login:10m rate=5r/m;

# HTTP → HTTPS redirect (Certbot va modifier ce bloc)
server {
    listen 80;
    server_name gungnir.scarletwolf.cloud;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name gungnir.scarletwolf.cloud;

    # SSL certs — Certbot va remplir ces lignes automatiquement
    ssl_certificate /etc/letsencrypt/live/gungnir.scarletwolf.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gungnir.scarletwolf.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    # SAMEORIGIN : SpearCode est rendu via une iframe interne (/code-frame).
    # Pas d'embed sur un domaine externe.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload (fichiers joints)
    client_max_body_size 50m;

    # ── API → backend container ────────────────────────────────────────────
    location /api/ {
        limit_req zone=gungnir_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (voice, streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout LLM streaming (5 min)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Rate limit login
    location /api/users/login {
        limit_req zone=gungnir_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Frontend static + SPA fallback ─────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache les assets statiques
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://127.0.0.1:8000;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
