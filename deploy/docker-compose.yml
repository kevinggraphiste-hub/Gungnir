# ============================================================================
# Gungnir — Docker Compose (production - Hostinger VPS)
#
# Architecture:
#   nginx (host) → 127.0.0.1:8000 → gungnir container → SQLite
#
# Usage:
#   cd /opt/gungnir/deploy
#   docker compose up -d --build
# ============================================================================

services:
  gungnir:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: gungnir-app
    restart: unless-stopped
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      # Persistent data (DB, config, backups, workspace)
      - gungnir-data:/app/data
    ports:
      # Expose only on localhost — nginx host handles external traffic
      - "127.0.0.1:8000:8000"
    mem_limit: 512m
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gungnir-data:
    driver: local
